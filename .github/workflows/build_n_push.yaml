name: build and push
on:
  push:
    branches: [main]
jobs:
  build_n_push:
    permissions:
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: jinlong11222356
          password: ${{ github.token }}
      - name: build
        run: | 
          docker build -t ghcr.io/jinlong11222356/altman:${{ github.sha }} .
          docker tag ghcr.io/jinlong11222356/altman:${{ github.sha }} ghcr.io/jinlong11222356/altman:latest
      - name: push
        run: |
          docker push ghcr.io/jinlong11222356/altman:${{ github.sha }}
          docker push ghcr.io/jinlong11222356/altman:latest
