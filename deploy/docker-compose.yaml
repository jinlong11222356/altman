services:
  bot:
    image: ghcr.io/jinlong11222356/altman:${ALTMAN_TAG:-latest}
    container_name: bot
    restart: unless-stopped
    networks:
      - proxy
      - db
    environment:
      - "WH_URL=${WH_URL}"
      - "BOT_TOKEN=${BOT_TOKEN}"
      - "DB_URL=${POSTGRES_URL}"
      - "GROUP_ID=${GROUP_ID}"
      - "MODER_GROUP_ID=${MODER_GROUP_ID}"
      - "OPS_ID=${OPS_ID}"
      - "INIT_PROMPT=${INIT_PROMPT}"

    depends_on:
      migration:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bot.entrypoints=websecure"

      - "traefik.http.routers.bot.rule=Host(`${WH_URL}`)"
      - "traefik.http.routers.bot.tls=true"
      - "traefik.http.routers.bot.tls.certresolver=dns-cloudflare"
      
      - "traefik.http.services.bot-deploy.loadbalancer.server.port=8080"
      
  migration:
    image: ghcr.io/jinlong11222356/altman-migration:${ALTMAN_TAG:-latest}
    container_name: migration
    
    command: -database ${POSTGRES_URL} -path /migrations/ up
    networks:
      - db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:alpine
    container_name: db
    environment:
      - "POSTGRES_USER=${POSTGRES_USER}"
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
      - "POSTGRES_DB=${POSTGRES_DB}"
      - "POSTGRES_PORT=${POSTGRES_PORT}"
    volumes:
      - dbdata:/var/lib/postgresql
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer
    restart: always
    networks:
      - db
    ports:
      - "2222:8080"
  
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/certs
    security_opt:
      - label:disable
      - no-new-privileges:true
    environment:
      - CF_DNS_API_TOKEN=${CLOUDFLARE_API_KEY}

    command:
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"

      # TLS cert
      - "--certificatesresolvers.dns-cloudflare.acme.dnsChallenge=true"
      - "--certificatesresolvers.dns-cloudflare.acme.storage=/certs/acme.json"
      - "--certificatesresolvers.dns-cloudflare.acme.dnschallenge.provider=cloudflare"
      
      # EntryPoints
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"

      # Providers 
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"

    labels:
      - "traefik.enable=true"


volumes:
  certs:
  dbdata:


networks:
  proxy:
    name: proxy
  db:
    name: db
